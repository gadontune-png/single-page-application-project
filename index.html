<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Currency Converter Pro</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <div class="container">
    <header>
      <h1>Currency Converter</h1>
      <p>Live exchange rates made simple</p>
      <button id="themeToggle">🌙</button>
    </header>

    <div class="converter-card">

      <!-- Amount -->
      <div class="input-group">
        <label>Amount</label>
        <input type="number" id="amount" placeholder="Enter amount" min="0"/>
      </div>

      <!-- From Currency -->
      <div class="input-group">
        <label>From</label>
        <input type="text" id="fromSearch" placeholder="Search currency..."/>
        <div class="input-group">
  <label>From</label>

  <div class="flag-row">
    <img id="fromFlag" class="flag-icon" src="" alt="">
  </div>

  <input type="text" id="fromSearch" placeholder="Search currency..."/>
  <select id="fromCurrency"></select>
</div>
        <select id="fromCurrency"></select>
      </div>

      <!-- Swap -->
      <button id="swapBtn">⇅ Swap</button>

      <!-- To Currency -->
      <div class="input-group">
        <label>To</label>
        <input type="text" id="toSearch" placeholder="Search currency..."/>
        <div class="input-group">
  <label>To</label>

  <div class="flag-row">
    <img id="toFlag" class="flag-icon" src="" alt="">
  </div>

  <input type="text" id="toSearch" placeholder="Search currency..."/>
  <select id="toCurrency"></select>
</div>

        <select id="toCurrency"></select>
      </div>

      <!-- Convert -->
      <button id="convertBtn">Convert</button>

      <!-- Result -->
      <div class="result" id="resultBox">
        Enter values to convert
      </div>

      <!-- Error -->
      <div class="error" id="errorBox"></div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
